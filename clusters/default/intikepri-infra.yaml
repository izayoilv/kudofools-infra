apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: intikepri-infra
  namespace: flux-system
spec:
  interval: 5m
  ref:
    branch: main
  secretRef:
    name: flux-system
  url: https://forgejo.kudofools.dev/izayoilv/intikepri-infra.git
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: intikepri-infra
  namespace: flux-system
spec:
  interval: 5m
  retryInterval: 1m
  sourceRef:
    kind: GitRepository
    name: intikepri-infra
  path: ./clusters/default/infra
  prune: true
