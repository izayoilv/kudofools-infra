apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: intikepri-infra
  namespace: flux-system
spec:
  interval: 12h
  ref:
    branch: main
  secretRef:
    name: flux-system
  url: https://forgejo.kudofools.dev/izayoilv/intikepri-infra.git
---
apiVersion: notification.toolkit.fluxcd.io/v1
kind: Receiver
metadata:
  name: intikepri-infra-webhook
  namespace: flux-system
spec:
  type: github
  secretRef:
    name: intikepri-infra-webhook
  resources:
    - kind: GitRepository
      name: intikepri-infra
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: intikepri-infra
  namespace: flux-system
spec:
  interval: 1h
  retryInterval: 1m
  sourceRef:
    kind: GitRepository
    name: intikepri-infra
  path: ./clusters/default/infra
  prune: true
