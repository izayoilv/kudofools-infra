apiVersion: apps/v1
kind: Deployment
metadata:
  name: woodpecker-agent
  namespace: default
  labels:
    app: woodpecker-agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: woodpecker-agent
  template:
    metadata:
      labels:
        app: woodpecker-agent
    spec:
      serviceAccountName: woodpecker-agent
      volumes:
        - name: tmp
          emptyDir: {}
      containers:
        - name: agent
          image: woodpeckerci/woodpecker-agent:v3.16.0
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
            seccompProfile:
              type: RuntimeDefault
            runAsUser: 1000
            runAsNonRoot: true
            readOnlyRootFilesystem: true
          env:
            - name: WOODPECKER_SERVER
              value: "woodpecker:9000"
            - name: WOODPECKER_AGENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: woodpecker-secrets
                  key: WOODPECKER_AGENT_SECRET
            - name: WOODPECKER_BACKEND
              value: "kubernetes"
            - name: WOODPECKER_BACKEND_K8S_NAMESPACE
              value: "woodpecker-pipelines"
            - name: WOODPECKER_BACKEND_K8S_VOLUME_SIZE
              value: "1Gi"
            - name: WOODPECKER_BACKEND_K8S_STORAGE_CLASS
              value: "local-path"
            - name: WOODPECKER_BACKEND_K8S_STORAGE_RWX
              value: "false"
            - name: WOODPECKER_HEALTHCHECK
              value: "true"
            - name: WOODPECKER_HEALTHCHECK_ADDR
              value: ":8080"
          ports:
            - containerPort: 8080
              name: health
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          resources:
            limits:
              memory: 256Mi
              cpu: "250m"
            requests:
              memory: 64Mi
              cpu: "50m"
