apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: forgejo-network-policy
  namespace: default
spec:
  podSelector:
    matchLabels:
      app: forgejo
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - port: 3000
    - from:
        - podSelector:
            matchLabels:
              app: woodpecker
      ports:
        - port: 3000
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: woodpecker-network-policy
  namespace: default
spec:
  podSelector:
    matchLabels:
      app: woodpecker
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - port: 8000
    - from:
        - podSelector:
            matchLabels:
              app: woodpecker-agent
      ports:
        - port: 9000
---
