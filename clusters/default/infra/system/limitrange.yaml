apiVersion: v1
kind: LimitRange
metadata:
  name: default-pod-limits
  namespace: default
spec:
  limits:
    - default:
        cpu: "500m"
        memory: 512Mi
      defaultRequest:
        cpu: "100m"
        memory: 64Mi
      max:
        cpu: "1"
        memory: 1Gi
      type: Container
---
apiVersion: v1
kind: LimitRange
metadata:
  name: buildkitd-limits
  namespace: buildkitd
spec:
  limits:
    - default:
        cpu: "500m"
        memory: 512Mi
      defaultRequest:
        cpu: "100m"
        memory: 64Mi
      max:
        cpu: "4"
        memory: 4Gi
      type: Container
---
apiVersion: v1
kind: LimitRange
metadata:
  name: step-pod-limits
  namespace: woodpecker-pipelines
spec:
  limits:
    - default:
        cpu: "200m"
        memory: 256Mi
      defaultRequest:
        cpu: "100m"
        memory: 64Mi
      max:
        cpu: "2"
        memory: 1Gi
      type: Container
