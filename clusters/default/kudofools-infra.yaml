apiVersion: notification.toolkit.fluxcd.io/v1
kind: Receiver
metadata:
  name: kudofools-infra-webhook
  namespace: flux-system
  labels:
    app.kubernetes.io/part-of: kudofools
    app.kubernetes.io/managed-by: flux
spec:
  type: github
  secretRef:
    name: kudofools-infra-webhook
  resources:
    - kind: GitRepository
      name: flux-system
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: kudofools-infra
  namespace: flux-system
spec:
  interval: 1h
  retryInterval: 1m
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./clusters/default/infra
  prune: true
