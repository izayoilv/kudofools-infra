apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: intikepri-cms
  namespace: flux-system
spec:
  interval: 12h
  ref:
    branch: main
  secretRef:
    name: flux-system
  url: https://forgejo.kudofools.dev/izayoilv/intikepri-cms.git
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: intikepri-cms
  namespace: flux-system
spec:
  dependsOn:
    - name: intikepri-infra
  interval: 1h
  retryInterval: 1m
  sourceRef:
    kind: GitRepository
    name: intikepri-cms
  path: ./deploy
  prune: true
