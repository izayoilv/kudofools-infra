    app.kubernetes.io/part-of: kudofools
    app.kubernetes.io/managed-by: flux
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao
    kind: ClusterSecretStore
  target:
    name: kudofools-infra-webhook
    deletionPolicy: Retain
  data:
