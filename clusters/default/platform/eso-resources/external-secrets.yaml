apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: woodpecker-secrets
  namespace: woodpecker
  labels:
    app.kubernetes.io/name: woodpecker
    app.kubernetes.io/part-of: kudofools
    app.kubernetes.io/managed-by: flux
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao
    kind: ClusterSecretStore
  target:
    name: woodpecker-secrets
    deletionPolicy: Retain
  data:
    - secretKey: WOODPECKER_AGENT_SECRET
      remoteRef:
        key: kv/woodpecker/secrets
        property: WOODPECKER_AGENT_SECRET
    - secretKey: WOODPECKER_FORGEJO_CLIENT
      remoteRef:
        key: kv/woodpecker/secrets
        property: WOODPECKER_FORGEJO_CLIENT
    - secretKey: WOODPECKER_FORGEJO_SECRET
      remoteRef:
        key: kv/woodpecker/secrets
        property: WOODPECKER_FORGEJO_SECRET
---
apiVersion: external-secrets.io/v1
