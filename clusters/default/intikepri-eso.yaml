apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: intikepri-eso
  namespace: flux-system
spec:
  interval: 5m
  retryInterval: 1m
  dependsOn:
    - name: intikepri-infra
  sourceRef:
    kind: GitRepository
    name: intikepri-infra
  path: ./clusters/default/platform/eso-resources
  prune: true
