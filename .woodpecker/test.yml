when:
  event: [push, manual]

steps:
  - name: check-tools-and-env
    image: moby/buildkit:v0.31.2
    commands:
      - buildctl --version
      - echo "Testing on repo $CI_REPO at commit $CI_COMMIT_SHA"

  - name: test-build-and-push
    image: moby/buildkit:v0.31.2
    environment:
      REGISTRY_PASSWORD:
        from_secret: registry_password
    commands:
      - mkdir -p /tmp/build
      - echo 'FROM alpine:3.24.1' > /tmp/build/Dockerfile
      - echo 'CMD ["echo", "hello-from-woodpecker"]' >> /tmp/build/Dockerfile
      - |
        for i in $(seq 1 5); do
          if buildctl --addr tcp://buildkitd-service.buildkitd.svc:1234 build \
            --frontend dockerfile.v0 \
            --local context=/tmp/build \
            --local dockerfile=/tmp/build \
            --output type=image,name=registry-service.default.svc:5000/test-hello:latest,push=true,registry.insecure=true,registry.username=admin,registry.password=$REGISTRY_PASSWORD; then
            exit 0
          fi
          echo "buildctl failed (attempt $i/5), retrying in 10s..."
          sleep 10
        done
        echo "All 5 retries exhausted"
        exit 1

  - name: verify-image
    image: alpine:3.24.1
    environment:
      REGISTRY_PASSWORD:
        from_secret: registry_password
    commands:
      - apk add --no-cache curl
      - |
        STATUS=$(curl -s -o /dev/null -w "%{http_code}" -u "admin:$REGISTRY_PASSWORD" "http://registry-service.default.svc:5000/v2/test-hello/manifests/latest" -H "Accept: application/vnd.oci.image.manifest.v1+json")
        echo "HTTP status = $STATUS"
        if [ "$STATUS" = "200" ]; then echo "OK"; else echo "FAIL: $STATUS"; exit 1; fi
